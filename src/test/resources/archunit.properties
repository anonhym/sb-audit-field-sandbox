# ArchUnit configuration for the freezing rule in AuditAndVersionArchTest.
#
# The findAndReplace/bulkOps ban is wrapped in a FreezingArchRule so the two pre-existing legitimate
# call sites in MongoTemplateService (findAndReplaceById, bulkMixedWrite) are grandfathered, while any
# NEW call site fails the build. The frozen violations are recorded in a TextFileBasedViolationStore
# under the directory below; allowStoreCreation lets the first run create it.
freeze.store.default.allowStoreCreation=true
freeze.store.default.path=src/test/resources/frozen
