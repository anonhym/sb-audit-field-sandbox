# TEMPLATE — copy to src/test/resources/archunit.properties
#
# Configures the FreezingArchRule used by AuditAndVersionArchTest#noNewCodeUsesFindAndReplaceOrBulkOps.
# The ban on findAndReplace/bulkOps is "frozen" so the pre-existing legitimate call sites are
# grandfathered into a violation store, while any NEW call site fails the build.
#
# - allowStoreCreation=true lets the FIRST run create the store (the recorded violations). Commit the
#   generated store directory afterwards so CI has the baseline.
# - path is where the TextFileBasedViolationStore lives (one file per rule). Keep it under test
#   resources so it travels with the tests.
freeze.store.default.allowStoreCreation=true
freeze.store.default.path=src/test/resources/frozen
